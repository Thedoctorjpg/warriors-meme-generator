<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warriors Meme Pump — GF 2026</title>
  <style>
    body {
      font-family: 'Arial Black', Arial, sans-serif;
      background: linear-gradient(135deg, #003087 0%, #000 100%);
      color: white;
      text-align: center;
      padding: 20px;
      margin: 0;
    }
    h1 { color: #00AEEF; text-shadow: 0 0 10px #FFCC00; }
    #meme {
      width: 100%; max-width: 500px;
      margin: 20px auto;
      border: 6px solid #00AEEF;
      background: #111;
      position: relative;
      box-shadow: 0 0 20px #FFCC00;
    }
    #meme img { width: 100%; display: block; }
    .overlay {
      position: absolute; left: 0; right: 0;
      font-size: 28px; font-weight: bold;
      text-shadow: 4px 4px 0 #000, -4px -4px 0 #000;
      color: #FFCC00; padding: 10px 20px;
      line-height: 1.2;
    }
    #topText { top: 8%; }
    #bottomText { bottom: 8%; }
    input, button {
      padding: 12px; margin: 8px;
      font-size: 16px; width: 90%; max-width: 400px;
    }
    button {
      background: #00AEEF; color: white; border: none;
      cursor: pointer; font-weight: bold;
    }
    button:hover { background: #FFCC00; color: #003087; }
  </style>
</head>
<body>
  <h1>🏉 WARRIORS MEME GENERATOR 🏉</h1>
  <p><strong>2026 Grand Final Run — Pump the Boys!</strong></p>
  
  <div id="meme">
    <img id="baseImg" src="https://1000logos.net/wp-content/uploads/2021/03/New-Zealand-Warriors-logo.png" alt="Warriors Logo">
    <div id="topText" class="overlay"></div>
    <div id="bottomText" class="overlay"></div>
  </div>

  <input type="text" id="topInput" placeholder="TOP TEXT e.g. BOYS ON A MISSION">
  <input type="text" id="bottomInput" placeholder="BOTTOM TEXT e.g. GRAND FINAL LOADING 💙🖤">
  <br>
  <button onclick="generateMeme()">🔥 GENERATE MEME</button>
  <button onclick="downloadMeme()">📥 SAVE FOR X</button>

  <script>
    function generateMeme() {
      document.getElementById('topText').innerText = document.getElementById('topInput').value.toUpperCase();
      document.getElementById('bottomText').innerText = document.getElementById('bottomInput').value.toUpperCase();
    }
    function downloadMeme() {
      const meme = document.getElementById('meme');
      html2canvas(meme, {scale: 2}).then(canvas => {
        const link = document.createElement('a');
        link.download = 'warriors-meme.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }
  </script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</body>
</html>
